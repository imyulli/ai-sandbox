<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Login Preview</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="page-shell">
        <section class="artboard" aria-labelledby="login-title">
            <h1 id="login-title" class="login-title" data-node-id="1:3">Login</h1>
            <label class="field-group" aria-label="Login form field">
                <span class="sr-only">Message</span>
                <input
                    class="message-field"
                    data-node-id="1:2"
                    type="text"
                    name="message"
                    placeholder=""
                    aria-label="Message"
                >
            </label>
            <button class="send-button" data-node-id="1:8 1:9" type="button">Send</button>
        </section>
    </main>
</body>
</html>
